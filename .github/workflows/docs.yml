# Build docbook and deploy to GitHub Pages at mayfly.microscaler.io
#
# Repo setup: Settings > Pages > Source: GitHub Actions.
# Custom domain: Settings > Pages > Custom domain: mayfly.microscaler.io
# DNS: Add CNAME record for mayfly.microscaler.io → <owner>.github.io (or use A records per GitHub docs).
#
name: Build and Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install mdBook
        run: cargo install mdbook

      - name: Build docbook
        run: cargo run -p docsbookgen

      - name: Add CNAME for mayfly.microscaler.io
        run: echo "mayfly.microscaler.io" > docsbook/CNAME

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docsbook/

  deploy:
    environment:
      name: github-pages
      url: https://mayfly.microscaler.io
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
