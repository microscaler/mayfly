# mayfly.microscaler.io = docbook (mdbook) only.
# API (cargo doc) is uploaded as artifact 'mayfly-api-docs' for deployment to crates.dio / crates.microscaler.io.
#
# Repo: Settings > Pages > Source: GitHub Actions; Custom domain: mayfly.microscaler.io
#
name: Build and Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install mdBook
        run: cargo install mdbook

      - name: Build docbook
        run: cargo run -p docsbookgen

      # mayfly.microscaler.io = docbook only (no index linking to API)
      - name: Prepare docbook-only deploy (mayfly.microscaler.io)
        run: |
          mkdir -p deploy
          cp -r docsbook/md/book/. deploy/
          echo "mayfly.microscaler.io" > deploy/CNAME

      - name: Upload pages artifact (docbook only)
        uses: actions/upload-pages-artifact@v4
        with:
          path: deploy/

      # API (cargo doc) artifact for deployment to crates.microscaler.io or crates.dio
      - name: Upload API docs artifact (for crates.dio / crates.microscaler.io)
        uses: actions/upload-artifact@v4
        with:
          name: mayfly-api-docs
          path: docsbook/api/

  deploy:
    environment:
      name: github-pages
      url: https://mayfly.microscaler.io
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
